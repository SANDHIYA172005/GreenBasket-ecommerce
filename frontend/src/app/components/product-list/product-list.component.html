<section class="shop-page">
  <div class="shop-layout">
    
    <div class="sidebar-wrapper">
      <h1>Shop Organic Groceries</h1>
      
      <aside class="filters card">
        <div class="filter-header">
          <h2>Filters</h2>
        </div>

      <div class="field search-field">
        <label for="search" class="filter-heading">Search</label>
        <div class="search-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input
            id="search"
            type="text"
            placeholder="Search organic groceries..."
            [(ngModel)]="searchQuery"
            (ngModelChange)="applyFilters()"
          />
        </div>
      </div>

      <div class="field filter-section">
        <label class="filter-heading">Categories</label>
        <div class="category-pills">
          <button
            class="pill"
            [class.active]="selectedCategory === 'All'"
            (click)="setCategory('All')"
          >All</button>
          @for (cat of categories; track cat) {
            <button
              class="pill"
              [class.active]="selectedCategory === cat"
              (click)="setCategory(cat)"
            >{{ cat }}</button>
          }
        </div>
      </div>

      <div class="field filter-section">
        <label for="maxPrice" class="filter-heading">
          Max price: <span class="price-val">₹{{ maxPrice }}</span>
        </label>
        <div class="slider-wrapper">
          <input
            id="maxPrice"
            class="price-slider"
            type="range"
            min="20"
            max="500"
            step="10"
            [(ngModel)]="maxPrice"
            (ngModelChange)="applyFilters()"
          />
        </div>
      </div>

      <div class="field filter-section">
        <label class="filter-heading">Preferences</label>
        
        <label class="custom-checkbox">
          <input type="checkbox" [(ngModel)]="organicOnly" (ngModelChange)="applyFilters()" />
          <span class="checkmark"></span>
          <span class="cb-label">Organic only</span>
        </label>

        <label class="custom-checkbox">
          <input type="checkbox" [(ngModel)]="onSaleOnly" (ngModelChange)="applyFilters()" />
          <span class="checkmark"></span>
          <span class="cb-label">On Sale only</span>
        </label>
      </div>

      <button class="btn clear-btn btn-block" (click)="resetFilters()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6L6 18M6 6l12 12"></path>
        </svg>
        Clear Filters
      </button>
      </aside>
    </div>

    <div class="product-area">
      <div class="result-header">
        <p class="result-count">
          {{ products.length }} product(s) found
        </p>
      </div>

      @if (products.length === 0) {
        <div class="empty-state card fade-in-up">
          <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <line x1="3.27" y1="6.96" x2="12" y2="12.01"></line>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
            <line x1="20.73" y1="6.96" x2="12" y2="12.01"></line>
          </svg>
          <h2>No products found</h2>
          <p>We couldn't find any groceries matching your filters.</p>
          <button class="btn btn-outline" (click)="resetFilters()">Reset Filters</button>
        </div>
      } @else {

      <div class="product-grid">
        @for (product of products; track product.id) {
          <app-product-card [product]="product"></app-product-card>
        }
      </div>
      }
    </div>
  </div>
</section>
