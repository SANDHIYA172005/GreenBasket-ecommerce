<section class="auth-page">
  <div class="auth-card card">
    <h1>Create your account</h1>
    <p>Join GreenBasket to shop fresh organic groceries.</p>

    @if (errorMessage) {
      <div class="alert">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="field">
        <label for="name">Full name</label>
        <input id="name" type="text" [(ngModel)]="name" name="name" required placeholder="Jane Doe" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required placeholder="At least 6 characters" />
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create account</button>
    </form>

    <p class="switch-auth">Already have an account? <a routerLink="/login">Log in</a></p>
  </div>
</section>
