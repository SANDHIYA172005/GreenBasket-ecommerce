<section class="auth-page">
  <div class="auth-card card">
    <h1>Welcome back</h1>
    <p>Log in to continue shopping and track your orders.</p>

    @if (errorMessage) {
      <div class="alert">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>

    <p class="switch-auth">Don't have an account? <a routerLink="/register">Sign up</a></p>
  </div>
</section>
